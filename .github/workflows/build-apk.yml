name: 🤖 Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - '*.py'
      - 'buildozer.spec'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # 允许手动触发

jobs:
  build-apk:
    name: Build APK on Ubuntu
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      # ── 1. 检出代码 ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. 设置 Python ───────────────────────────────────────────────────────
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # ── 3. 缓存 Buildozer 全局目录（SDK/NDK/p4a 下载，节约时间）────────────
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      # ── 4. 安装系统依赖 ──────────────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git zip unzip \
            openjdk-17-jdk \
            autoconf automake libtool \
            pkg-config libffi-dev libssl-dev \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake make patch \
            python3-dev build-essential \
            libsqlite3-dev sqlite3 \
            lld

      # ── 5. 安装 Python 依赖 ──────────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer==1.5.0
          pip install cython==0.29.36

      # ── 6. 检查 buildozer.spec ────────────────────────────────────────────────
      - name: Validate buildozer.spec
        run: |
          echo "=== buildozer.spec ==="
          cat buildozer.spec
          echo "=== Project files ==="
          ls -la *.py *.dat

      # ── 7. 构建 APK ──────────────────────────────────────────────────────────
      - name: Build APK with Buildozer
        env:
          ANDROID_SDK_ROOT: ~/.buildozer/android/platform/android-sdk
        run: |
          buildozer -v android debug 2>&1 | tee build.log
          echo "Build finished with exit code: $?"

      # ── 8. 上传 APK Artifact ─────────────────────────────────────────────────
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vlpr-debug-apk
          path: bin/*.apk
          retention-days: 30

      # ── 9. 上传构建日志（构建失败时也上传，方便排查）────────────────────────
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      # ── 10. 在 Summary 中展示 APK 信息 ──────────────────────────────────────
      - name: Display APK info
        if: success()
        run: |
          APK=$(find bin -name "*.apk" | head -1)
          if [ -n "$APK" ]; then
            SIZE=$(du -sh "$APK" | cut -f1)
            echo "## ✅ APK 构建成功" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| 项目 | 信息 |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|" >> $GITHUB_STEP_SUMMARY
            echo "| 文件 | \`$(basename $APK)\` |" >> $GITHUB_STEP_SUMMARY
            echo "| 大小 | $SIZE |" >> $GITHUB_STEP_SUMMARY
            echo "| 时间 | $(date '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "下载方式：进入 Actions → 本次 Run → Artifacts → **vlpr-debug-apk**" >> $GITHUB_STEP_SUMMARY
          fi
