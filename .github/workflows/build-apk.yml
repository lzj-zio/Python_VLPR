name: 🤖 Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - '*.py'
      - 'buildozer.spec'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # 允许手动触发

jobs:
  build-apk:
    name: Build APK on Ubuntu
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      # ── 1. 检出代码 ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. 设置 Python ───────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 新版 Android Gradle Plugin 要求 Java 17（runner 默认 JAVA_HOME 指向 Java 11）
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 3. 缓存 Buildozer 全局目录（SDK/NDK/p4a 下载，节约时间）────────────
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      # ── 4. 安装系统依赖 ──────────────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git zip unzip \
            openjdk-17-jdk \
            autoconf automake libtool \
            pkg-config libffi-dev libssl-dev \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake make patch \
            python3-dev build-essential \
            libsqlite3-dev sqlite3 \
            lld

      # ── 5. 安装 Python 依赖 ──────────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade buildozer python-for-android
          pip install "cython==3.0.11"

      # ── 6. 检查 buildozer.spec ────────────────────────────────────────────────
      - name: Validate buildozer.spec
        run: |
          echo "=== buildozer.spec ==="
          cat buildozer.spec
          echo "=== Project files ==="
          ls -la *.py *.dat

      # ── 7. 构建 APK ──────────────────────────────────────────────────────────
      - name: Build APK with Buildozer
        env:
          ANDROID_SDK_ROOT: ~/.buildozer/android/platform/android-sdk
        run: |
          set -o pipefail
          # camera4kivy 的 p4a hook (camerax_provider/gradle_options.py) 在 pip 包内，
          # 但 buildozer 把 p4a.hook 当成项目根相对路径来找 → FileNotFoundError。
          # 从 host 安装的 camera4kivy 把 camerax_provider 整个目录复制到项目根。
          if [ ! -e camerax_provider/gradle_options.py ]; then
            # --no-deps：host 没装 kivy，正常 import camera4kivy 会因 kivy 缺失失败。
            # 只取文件，不 import；用 find 在 site-packages 定位 hook 目录后复制。
            pip install --quiet --no-deps camera4kivy
            PURELIB=$(python -c "import sysconfig; print(sysconfig.get_paths()['purelib'])")
            HOOK=$(find "$PURELIB" -name gradle_options.py -path '*camerax_provider*' 2>/dev/null | head -1)
            if [ -n "$HOOK" ]; then
              cp -r "$(dirname "$HOOK")" ./camerax_provider
              echo "copied camerax_provider from $(dirname "$HOOK")"
              ls -la camerax_provider/
            else
              echo "::error::camerax_provider/gradle_options.py 未在 $PURELIB 找到"
              exit 1
            fi
          fi
          buildozer -v android debug 2>&1 | tee build.log
          BUILD_RC=${PIPESTATUS[0]}
          echo "buildozer exit code: $BUILD_RC"
          # 显式校验 APK 真的产出，避免假性 success
          if ! ls bin/*.apk >/dev/null 2>&1; then
            echo "::error::buildozer 未产出 APK（bin/*.apk 为空），构建实际失败"
            exit 1
          fi
          if [ "$BUILD_RC" -ne 0 ]; then
            echo "::error::buildozer 退出码 $BUILD_RC"
            exit "$BUILD_RC"
          fi

      # ── 8. 上传 APK Artifact ─────────────────────────────────────────────────
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vlpr-debug-apk
          path: bin/*.apk
          retention-days: 30

      # ── 9. 上传构建日志（构建失败时也上传，方便排查）────────────────────────
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      # ── 10. 在 Summary 中展示 APK 信息 ──────────────────────────────────────
      - name: Display APK info
        if: success()
        run: |
          APK=$(find bin -name "*.apk" | head -1)
          if [ -n "$APK" ]; then
            SIZE=$(du -sh "$APK" | cut -f1)
            echo "## ✅ APK 构建成功" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| 项目 | 信息 |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|" >> $GITHUB_STEP_SUMMARY
            echo "| 文件 | \`$(basename $APK)\` |" >> $GITHUB_STEP_SUMMARY
            echo "| 大小 | $SIZE |" >> $GITHUB_STEP_SUMMARY
            echo "| 时间 | $(date '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "下载方式：进入 Actions → 本次 Run → Artifacts → **vlpr-debug-apk**" >> $GITHUB_STEP_SUMMARY
          fi
